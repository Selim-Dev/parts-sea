version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bahr-backend
    restart: unless-stopped
    ports:
      - "8080:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/spare_parts
    depends_on:
      - postgres
      - redis
    networks:
      - bahr-network

  # Dashboard (Admin Panel)
  dashboard:
    build:
      context: ./dashbaord
      dockerfile: Dockerfile
    container_name: bahr-dashboard
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      - VITE_API_URL=https://api.bahr-alqeta3.store
    networks:
      - bahr-network

  # Landing Page
  landing:
    build:
      context: ./landing
      dockerfile: Dockerfile
    container_name: bahr-landing
    restart: unless-stopped
    ports:
      - "8082:3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://api.bahr-alqeta3.store
    networks:
      - bahr-network

  # PostgreSQL Database
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: bahr-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=spare_parts
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - bahr-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: bahr-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - bahr-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:

networks:
  bahr-network:
    driver: bridge
