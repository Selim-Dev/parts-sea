version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bahr-backend
    restart: unless-stopped
    ports:
      - "8080:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGODB_URI=${MONGODB_URI}
      - MONGODB_DB_NAME=${MONGODB_DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - bahr-network

  # Dashboard (Admin Panel)
  dashboard:
    build:
      context: ./dashbaord
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://api.bahr-alqeta3.store/api
    container_name: bahr-dashboard
    restart: unless-stopped
    ports:
      - "8081:80"
    networks:
      - bahr-network

  # Landing Page
  landing:
    build:
      context: ./landing
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.bahr-alqeta3.store/api
    container_name: bahr-landing
    restart: unless-stopped
    ports:
      - "8082:3000"
    networks:
      - bahr-network

networks:
  bahr-network:
    driver: bridge
